# external-secret.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: app-secrets
spec:
  refreshInterval: 1h          # sync lại mỗi 1 giờ
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: db-credentials-k8s    # tên K8s Secret sẽ tạo ra
    creationPolicy: Owner       # ESO sở hữu — tự xóa khi ExternalSecret bị xóa
  data:
    - secretKey: username         # key trong K8s Secret
      remoteRef:
        key: my-app/db-credentials # tên trong AWS
        property: username
    - secretKey: password
      remoteRef:
        key: my-app/db-credentials
        property: password